name: Terraform (wemogy)
author: wemogy
description: Connects to a Terraform backend, applies or plans the changes and outputs the Terraform Output variables
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  working-directory:
    required: true
    description: "The directory of your terraform scripts"
  workspace:
    description: "The terraform workspace"
    required: false
  plan:
    description: "Plan the changes"
    default: "false"
    required: true
  apply:
    description: "Apply the changes"
    default: "true"
    required: true
  destroy:
    description: "Destroy the changes"
    default: "false"
    required: true
  force:
    description: "Enforce changes, even if prevent_destroy is set to 'true'"
    default: "false"
    required: true
  client-id:
    description: "The Azure Service Principal / Managed Identity Client ID"
    required: true
  client-secret:
    description: "The Azure Service Principal Secret. Leave empty to authenticate via OIDC (federated credentials)."
    required: false
    default: ""
  tenant-id:
    description: "The Azure Service Principal Tenant ID"
    required: true
  subscription-id:
    description: "The Azure Subscription ID. Required when authenticating via OIDC."
    required: false
    default: ""
  backend-storage-account-name:
    description: "The Name of the Azure Storage Account that hosts the remote Terraform backend"
    required: true
  backend-container-name:
    description: "The Name of the the storage container that hosts the remote Terraform backend"
    required: true
  backend-key:
    description: "The name of the file that hosts the remote Terraform backend"
    required: true

outputs:
  output:
    description: "The Terraform output in JSON format"
    value: ${{ steps.terraform-output.outputs.output }}

runs:
  using: "composite"
  steps:
    # Check if 'force' is set.
    # If so, this script replace s'prevent_destroy = true' with 'prevent_destroy = false' in all .tf files
    # see: https://notes.rioastamal.net/2020/03/terraform-force-destroy-resource-when-prevent-destroy-true.html
    - name: Check if force is set
      run: |
        if [[ "${{ inputs.force }}" == "true" ]]; then
          find . -name '*.tf' -type f -exec perl -i -pe 's@prevent_destroy = true@prevent_destroy = false@g' {} \;
        fi
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    # Setup terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Authenticate via OIDC (federated credentials) when no client secret is provided.
    # The consuming workflow must grant the `id-token: write` permission for this to work.
    - name: Azure Login (OIDC)
      if: ${{ inputs.client-secret == '' }}
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.client-id }}
        tenant-id: ${{ inputs.tenant-id }}
        subscription-id: ${{ inputs.subscription-id }}

    # Authenticate via a Service Principal client secret (legacy).
    - name: Azure Login (Client Secret)
      if: ${{ inputs.client-secret != '' }}
      uses: azure/login@v2
      with:
        allow-no-subscriptions: true
        creds: '{"clientId":"${{ inputs.client-id }}","clientSecret":"${{ inputs.client-secret }}","tenantId":"${{ inputs.tenant-id }}"}'

    # Expose the credentials to Terraform's azurerm provider and backend.
    # The backend authenticates against the state storage account via Azure AD (use_azuread_auth),
    # so no storage account access key is needed. OIDC additionally requires ARM_USE_OIDC.
    - name: Configure Terraform Azure credentials
      shell: bash
      run: |
        echo "ARM_CLIENT_ID=${{ inputs.client-id }}" >> "$GITHUB_ENV"
        echo "ARM_TENANT_ID=${{ inputs.tenant-id }}" >> "$GITHUB_ENV"
        echo "ARM_USE_AZUREAD=true" >> "$GITHUB_ENV"
        if [[ -n "${{ inputs.subscription-id }}" ]]; then
          echo "ARM_SUBSCRIPTION_ID=${{ inputs.subscription-id }}" >> "$GITHUB_ENV"
        fi
        if [[ -z "${{ inputs.client-secret }}" ]]; then
          echo "ARM_USE_OIDC=true" >> "$GITHUB_ENV"
        else
          echo "ARM_CLIENT_SECRET=${{ inputs.client-secret }}" >> "$GITHUB_ENV"
        fi

    # Initialize terraform
    - name: Init Terraform
      run: |
        terraform init \
          -upgrade \
          -reconfigure \
          -backend-config="storage_account_name=${{ inputs.backend-storage-account-name }}" \
          -backend-config="container_name=${{ inputs.backend-container-name }}" \
          -backend-config="key=${{ inputs.backend-key }}" \
          -backend-config="use_azuread_auth=true"
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    # Switch terraform workspace
    - name: Switch to dev workspace
      run: |
        if [[ "${{ inputs.workspace }}" != "" ]]; then
          echo "Switching workspace to ${{ inputs.workspace }}..."
          terraform workspace select ${{ inputs.workspace }}
        fi
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    # Plan the terraform changes
    - name: Plan terraform
      run: |
        if [[ "${{ inputs.plan }}" == "true" ]]; then
          echo "Running terraform plan..."
          terraform plan
        fi
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    # Apply / Destroy
    - name: Apply / Destroy terraform
      run: |
        if [[ "${{ inputs.apply }}" == "true" ]]; then
          echo "Running terraform apply..."
          terraform apply -auto-approve
        elif [[ "${{ inputs.destroy }}" == "true" ]]; then
          echo "Running terraform destroy..."
          terraform destroy -auto-approve
        fi
      shell: bash
      working-directory: ${{ inputs.working-directory }}

    # Export terraform outputs to output of this job
    - name: Terraform Output
      id: terraform-output
      working-directory: ${{ inputs.working-directory }}
      run: |
        TERRAFORM_OUTPUT=$(terraform output --json | jq -c .)
        echo "output=$TERRAFORM_OUTPUT" >> $GITHUB_OUTPUT
      shell: bash
