name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version
        id: version
        uses: wemogy/get-release-version-action@v4.3.2
        with:
          git-username: wemogy-admin
          git-email: it@wemogy.com
          prefix: ""

      - name: Create GitHub Release
        if: steps.version.outputs.tag-created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version-name }}" \
            --title "${{ steps.version.outputs.version-name }}" \
            --generate-notes \
            --latest
